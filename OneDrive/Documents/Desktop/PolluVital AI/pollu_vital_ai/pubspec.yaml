name: pollu_vital_ai
description: PolluVital AI - on-device multimodal air pollution health risk predictor.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  record: ^5.1.2
  permission_handler: ^11.3.1
  dio: ^5.4.3+1
  tflite_flutter: ^0.11.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  fl_chart: ^0.68.0
  intl: ^0.20.2
  pdf: ^3.11.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/i18n/
    - assets/samples/
